[build-system]
requires = ["scikit-build-core>=0.3.3"]
build-backend = "scikit_build_core.build"

[project]
name = "highspy-extras"
version = "1.13.1"
description = "HiPO IPM solver extension for highspy"
authors = [{ name = "HiGHS developers", email = "highsopt@gmail.com" }]
readme = "README.md"

requires-python = ">=3.8"
# dependencies = ["highspy>=1.12.0"]

classifiers = [
  "License :: OSI Approved :: Apache License",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]

[project.urls]
"Source Code" = "https://github.com/ERGO-Code/HiGHS"
"Bug Tracker" = "https://github.com/ERGO-Code/HiGHS/issues"

[tool.scikit-build]
cmake.args = ["-DHIPO_EXTRAS_LIBRARY_BUILD=ON"]
cmake.verbose = true
wheel.expand-macos-universal-tags = true
wheel.packages = ["highspy_extras"]
wheel.exclude = [
 "include",
 "lib*/",
 "bin",
 "LICENSE.txt",
 "README.md"
]

# Files to include in the SDist even if they are skipped by default. Supports
# gitignore syntax.
sdist.include = [
  "highspy-extras/*",
  "LICENSE",
  "README.md",
  "THIRD_PARTY_NOTICES.md",
  "extern",
  "cmake",
]

sdist.exclude = [
  ".github",
  ".gitattributes",
  ".gitignore",
  ".github",
  "app",
  "build",
  "check",
  "docs",
  "subprojects",
  ".coin-or",
  "build_webdemo.sh",
  ".clang-format",
  "__setup.py",
  "BUILD.bazel",
  "**meson**",
  "MODS.md",
  "WORKSPACE",
  "nuget/",
  "nuget/README.md",
  "highs/*.bazel*",
  "highs/*.meson*",
  "interfaces/*csharp*",
  "interfaces/*fortran*",
  "flake.*",
  "highs.pc.in"
]

[tool.cibuildwheel]
repair-wheel-command = ""

[tool.cibuildwheel.linux]
before-build = '''
bash -lc '
set -e
# Install zip/unzip (works for manylinux images using yum; falls back to apt)
if command -v yum >/dev/null 2>&1; then
  yum -y install zip unzip
elif command -v apt-get >/dev/null 2>&1; then
  apt-get update && apt-get install -y zip unzip
elif command -v apk >/dev/null 2>&1; then
  apk add --no-cache zip unzip
fi

# idempotent vcpkg bootstrap + install
if [ ! -d /opt/vcpkg ]; then
  git clone https://github.com/microsoft/vcpkg.git /opt/vcpkg
  /opt/vcpkg/bootstrap-vcpkg.sh
fi
/opt/vcpkg/vcpkg install zlib openblas --triplet x64-linux
'
'''
environment = { VCPKG_ROOT = "/opt/vcpkg", VCPKG_TARGET_TRIPLET = "x64-linux" }

