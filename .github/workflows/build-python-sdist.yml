name: build-python-sdist

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_sdist_ubuntu:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@master

      - name: Build sdist
        shell: bash
        run: pipx run build --sdist

      - name: check metadata
        run: pipx run twine check dist/*

      - name: install highspy
        run: |
          python3 -m pip install dist/*.tar.gz --user

      - name: Test Python Examples
        run: |
         python3 ./examples/call_highs_from_python_highspy.py
         python3 ./examples/call_highs_from_python_mps.py
         python3 ./examples/call_highs_from_python.py
         python3 ./examples/minimal.py

  build_sdist_mac:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@master

      - name: Build sdist
        shell: bash
        run: pipx run build --sdist

      - name: check metadata
        run: pipx run twine check dist/*

      - name: install highspy
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install dist/*.tar.gz

      - name: Test Python Examples
        run: |
         source .venv/bin/activate
         python3 ./examples/call_highs_from_python_highspy.py
         python3 ./examples/call_highs_from_python_mps.py
         python3 ./examples/call_highs_from_python.py
         python3 ./examples/minimal.py

  build_sdist_win:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - name: check metadata
        run: pipx run twine check dist/*

      - name: install highspy
        run: python -m pip install (Get-ChildItem dist\*.tar.gz)

      - name: Test Python Examples
        run: |
         python ./examples/call_highs_from_python_highspy.py
         python ./examples/call_highs_from_python_mps.py
         python ./examples/call_highs_from_python.py
         python ./examples/minimal.py

  build_sdist_ubuntu_hipo:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@master

      - name: Build sdist
        shell: bash
        run: pipx run build --sdist --outdir ./dist highspy-extras/

      - name: Build sdist
        shell: bash
        run: pipx run build --sdist

      - name: check metadata
        run: pipx run twine check dist/*

      - name: install highspy
        run: |
          python3 -m pip install dist/*.tar.gz --user

      - name: Test highspy
        run: |
          python3 -m pip install pytest
          python3 -m pytest check/test_highspy_hipo.py

      - name: Test Python Examples
        run: |
         python3 ./examples/call_highs_from_python_highspy.py
         python3 ./examples/call_highs_from_python_mps.py
         python3 ./examples/call_highs_from_python.py
         python3 ./examples/minimal.py

  build_sdist_mac_hipo:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@master

      - name: Build sdist
        shell: bash
        run: pipx run build --sdist --outdir ./dist highspy-extras/

      - name: Build sdist
        shell: bash
        run: pipx run build --sdist

      - name: check metadata
        run: pipx run twine check dist/*

      - name: install highspy and highspy_extras
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install dist/*.tar.gz

      - name: Debug extras loading
        run: |
          source .venv/bin/activate
          python -c "import highspy._core; print(highspy._core.getExtrasLoadStatus())"
          python -c "import highspy_extras; print(highspy_extras.__file__); print(highspy_extras._PACKAGE_DIR)"
          python -c "import highspy_extras; highspy_extras._load_library()"

      - name: Test highspy
        run: |
          source .venv/bin/activate
          python3 -m pip install pytest
          python3 -m pytest check/test_highspy_hipo.py

      - name: Test Python Examples
        run: |
         source .venv/bin/activate
         python3 ./examples/call_highs_from_python_highspy.py
         python3 ./examples/call_highs_from_python_mps.py
         python3 ./examples/call_highs_from_python.py
         python3 ./examples/minimal.py

  build_sdist_win_hipo:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build highspy_extras sdist
        run: pipx run build --sdist highspy-extras --outdir dist

      - name: Build highspy sdist
        run: pipx run build --sdist

      - name: check metadata
        run: pipx run twine check dist/*

      - name: Pre-install vcpkg dependencies
        run: vcpkg install openblas[threads]:x64-windows-static --host-triplet=x64-windows-static

      - name: install highspy and highspy_extras
        run: python -m pip install (Get-ChildItem dist\*.tar.gz)

      - name: Debug extras loading
        run: |
          python -c "import highspy._core; print(highspy._core.getExtrasLoadStatus())"
          python -c "import highspy_extras; print(highspy_extras.__file__); print(highspy_extras._PACKAGE_DIR)"
          python -c "import highspy_extras; highspy_extras._load_library()"
          
      - name: Test highspy
        run: |
          python -m pip install pytest
          python -m pytest check/test_highspy_hipo.py

      - name: Test Python Examples
        run: |
         python ./examples/call_highs_from_python_highspy.py
         python ./examples/call_highs_from_python_mps.py
         python ./examples/call_highs_from_python.py
         python ./examples/minimal.py