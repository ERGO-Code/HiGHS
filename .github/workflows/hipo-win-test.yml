name: hipo-win-test

on: [push, pull_request]

jobs:
  release_all_tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v4

      # 2. Set up caching for vcpkg
      - name: Cache vcpkg
        uses: actions/cache@v3
        with:
          path: |
            ./vcpkg/installed
            ./vcpkg/downloads
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Install METIS
        run: vcpkg install metis

      - name: Install OpenBLAS
        run: vcpkg install openblas

      - name: Create build dir
        run: cmake -E make_directory ${{runner.workspace}}/build

      - name: Configure cmake
        shell: bash
        working-directory: ${{runner.workspace}}/build
        run: |
          cmake $GITHUB_WORKSPACE \
          -DHIPO=ON \
          -DALL_TESTS=ON \
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build 
        shell: bash
        working-directory: ${{runner.workspace}}/build
        run: |
          cmake --build . --parallel --config Release

      - name: Test executable 
        shell: bash
        working-directory: ${{runner.workspace}}/build
        run: ./Release/bin/highs --solver=hipo $GITHUB_WORKSPACE/check/instances/afiro.mps

      - name: Run test-hipo-deterministic
        shell: bash
        working-directory: ${{runner.workspace}}/build
        run: ./Release/bin/unit_tests test-hipo-deterministic

      - name: Run test-hipo-deterministic again
        shell: bash
        working-directory: ${{runner.workspace}}/build
        run: ./Release/bin/unit_tests test-hipo-deterministic