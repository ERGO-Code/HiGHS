name: test-python-win

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # os: [self-hosted]
        os: [windows-2022]
        python: ["3.10", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Install correct python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install pytest
        run: python -m pip install pytest

      - name: Test python install
        run: |
          python -m pip install ./highspy
          pytest ./highspy

      - name: Test Python Examples
        run: |
         python ./examples/call_highs_from_python_highspy.py
         python ./examples/call_highs_from_python_mps.py
         python ./examples/minimal.py

  build_hipo:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # os: [self-hosted]
        os: [windows-2022]
        python: [3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Install correct python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Test python install
        run: |
          python -m pip install ./highspy-extras
          python -m pip install ./highspy
          pytest
          pytest check/test_highspy_hipo.py

      - name: Test Python Examples
        run: |
         python ./examples/call_highs_from_python_highspy.py
         python ./examples/call_highs_from_python_mps.py
         python ./examples/minimal.py

  build_hipo_local:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022]
        python: [3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Install correct python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Install OpenBLAS
        run: vcpkg install openblas[threads]

      - name: Install highspy-extras
        run: |
          python -m pip install ./highspy-extras `
              --config-settings=cmake.define.BUILD_OPENBLAS=OFF `
              --config-settings=cmake.define.CMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          python -c "import highspy-extras; print(dir(highspy-extras))"

      - name: Install highspy
        run: |
          python -m pip install ./highspy
          python -c "import highspy; print(dir(highspy))"

      - name: Test python install
        run: |
          pytest ./highspy
          pytest check/test_highspy_hipo.py

      - name: Test Python Examples
        run: |
         python ./examples/call_highs_from_python_highspy.py
         python ./examples/call_highs_from_python_mps.py
         python ./examples/minimal.py